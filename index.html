<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>キッチンメモ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #F2F2F7; /* iOS標準の薄いグレー */
            -webkit-tap-highlight-color: transparent;
        }
        /* スムーズな開閉アニメーション */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease-out, opacity 0.2s;
            opacity: 0;
        }
        .accordion-content.open {
            max-height: 800px;
            opacity: 1;
            padding-top: 12px;
            padding-bottom: 4px;
        }
        /* 入力欄のフォーカス時に青枠をクッキリ見せる */
        input:focus {
            border-color: #007AFF !important;
            outline: none;
        }
    </style>
</head>
<body class="p-4 pb-12 select-none">

<div id="app" class="max-w-md mx-auto">
    
    <div id="lock-screen" class="flex flex-col items-center justify-center min-h-[80vh]">
        <div class="bg-white rounded-2xl p-8 w-full text-center shadow-sm">
            <div class="text-4xl mb-4">🔒</div>
            <h2 class="text-lg font-bold text-gray-800 mb-6">合言葉を入力してください</h2>
            <input type="password" id="password-input" class="w-full p-4 border border-gray-200 rounded-xl mb-4 text-center text-2xl bg-gray-50 tracking-widest" placeholder="••••">
            <button onclick="checkPassword()" class="w-full py-4 bg-[#007AFF] text-white rounded-xl font-bold text-md active:opacity-80 transition-opacity">認証する</button>
            <p id="error-msg" class="mt-4 text-sm text-red-500 font-bold hidden">合言葉が違います</p>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header class="flex items-center justify-between mb-5 px-1">
            <button id="back-btn" onclick="goBack()" class="text-[#007AFF] font-bold text-md hidden flex items-center">
                ‹ 戻る
            </button>
            <h1 id="page-title" class="text-2xl font-bold text-gray-900 transition-all">キッチンメモ</h1>
            <div class="w-10"></div> </header>

        <div id="menu-categories" class="space-y-3">
            <button onclick="openCategory('刺し場')" class="w-full p-5 bg-white rounded-2xl text-left font-bold text-gray-800 shadow-sm flex justify-between items-center active:bg-gray-50">
                <span>🐟 刺し場</span><span class="text-gray-300">›</span>
            </button>
            <button onclick="openCategory('揚げ場')" class="w-full p-5 bg-white rounded-2xl text-left font-bold text-gray-800 shadow-sm flex justify-between items-center active:bg-gray-50">
                <span>🍟 揚げ場</span><span class="text-gray-300">›</span>
            </button>
            <button onclick="openCategory('焼き場')" class="w-full p-5 bg-white rounded-2xl text-left font-bold text-gray-800 shadow-sm flex justify-between items-center active:bg-gray-50">
                <span>🔥 焼き場</span><span class="text-gray-300">›</span>
            </button>
            <button onclick="openCategory('ポーション')" class="w-full p-5 bg-white rounded-2xl text-left font-bold text-gray-800 shadow-sm flex justify-between items-center active:bg-gray-50">
                <span>⚖️ ポーション</span><span class="text-gray-300">›</span>
            </button>
            <button onclick="openCategory('シフト表')" class="w-full p-5 bg-white rounded-2xl text-left font-bold text-gray-800 shadow-sm flex justify-between items-center active:bg-gray-50">
                <span>📅 シフト表</span><span class="text-gray-300">›</span>
            </button>
        </div>

        <div id="list-view" class="hidden space-y-2">
            <div id="accordion-container" class="space-y-2"></div>
        </div>

        <div id="shift-view" class="hidden space-y-4">
            <div class="bg-white rounded-2xl p-4 shadow-sm text-center">
                <span class="text-[11px] font-bold text-purple-600 block mb-3 bg-purple-50 py-1 rounded-full">2024/03/12 18:00 更新</span>
                <div class="space-y-4 text-left">
                    <div>
                        <span class="text-xs font-bold text-gray-400 block mb-1">▼ 1日 〜 15日</span>
                        <img src="https://drive.google.com/thumbnail?authuser=0&sz=w1000&id=1zHH3IqT30XMp83ft2s6X7oAM-8ySHNNP" class="w-full h-auto rounded-xl border border-gray-100" alt="前半シフト">
                    </div>
                    <div>
                        <span class="text-xs font-bold text-gray-400 block mb-1">▼ 16日 〜 末日</span>
                        <img src="https://drive.google.com/thumbnail?authuser=0&sz=w1000&id=1J-N8B4IvyShS9qhQTNpTsvL67wxqFihk" class="w-full h-auto rounded-xl border border-gray-100" alt="後半シフト">
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    const CORRECT_PASSWORD = "1405";

    // 業務データ（シンプルで見やすいテキストに変更）
    const data = {
        "刺し場": [
            { name: "枝豆", type: "text", text: "500Wで2分温め、皿に盛って塩をふる" },
            { name: "冷やしトマト", type: "steps", steps: ["トマト半分に切りヘタを取る", "6等分にスライス", "マヨネーズとサラダを添える"] },
            { name: "たこわさ / 梅クラゲ", type: "text", text: "器に半分にした大葉を敷き、各30g盛り付け" },
            { name: "チャンジャ", type: "text", text: "半分にした大葉を敷き、30g盛り付け。ネギを散らす" },
            { name: "とりかわぽん", type: "steps", steps: ["大葉を敷く", "オニオンスライスを乗せる", "とりかわを盛り付ける", "ネギ、大根おろしを乗せ、ポン酢をかける"] },
            { name: "えのきぽん", type: "steps", steps: ["500Wで1分温める", "えのきを盛り付ける", "ネギ、大根おろしを乗せ、ポン酢をかける"] },
            { name: "無限ピーマン", type: "text", text: "ごま油、塩、塩昆布、白ごまで和える" },
            { name: "漬物盛合せ", type: "text", text: "たくあん30g、かっぱ30g、しば漬け30g" },
            { name: "長芋わさび", type: "text", text: "器に長いもを80g盛り、刻みのりを乗せる" },
            { name: "たたききゅうり", type: "steps", steps: ["皿にたたききゅうりを盛る", "しおだれをかける", "ゴマを振る"] },
            { name: "とりのたたき", type: "steps", steps: ["器にオニスラを盛り、大葉を乗せる", "たたきを4枚並べる", "小皿にネギ、しょうがを添える"] },
            { name: "鶏わさび和え / 梅肉和え", type: "steps", steps: ["皿に大葉とオニスラを盛る", "ユッケ60gにわさび醤油（または梅肉）を混ぜて盛る", "のりを乗せる"] },
            { name: "鶏ユッケ / 鶏塩ユッケ", type: "steps", steps: ["皿に大葉とオニスラを盛る", "ユッケ60gを盛る", "ユッケタレ（または塩だれ）をかける", "生うずら、ネギ、白ごまを乗せる"] },
            { name: "出汁巻きたまご", type: "text", text: "600Wで4分温め、笹葉の上に盛る。おろし大根を添える" },
            { name: "しめさば", type: "text", text: "水で解凍後、8等分にして炙る。オニスラ・大葉の上に盛り、わさびを添える" },
            { name: "サラダ（蒸し鶏/豆腐塩昆布/温玉シーザー）", type: "text", text: "ベース：サラダ、オニスラ、ミニトマト半分2個\n・蒸し鶏：ささみ1P＋胡麻ドレ\n・豆腐：豆腐4等分＋塩昆布＋和風ドレ＋かつお節\n・シーザー：温玉1個＋クルトン＋粉チーズ＋シーザードレ" }
        ],
        "揚げ場": [
            { name: "ポテトフライ", type: "text", text: "2分30秒揚げる。塩をふり、ケチャップを添える" },
            { name: "さつまバター", type: "text", text: "4分揚げる。バター、ハチミツ、パセリをかける" },
            { name: "もろこし唐揚げ", type: "text", text: "3分揚げる。塩、パセリを振る" },
            { name: "名古屋風手羽先唐揚げ", type: "steps", steps: ["手羽先を500Wで1分温める", "片栗粉をまぶして5分揚げる", "キャベツの上に盛り、手羽タレ、コショウ、白ごま"] },
            { name: "なんこつ唐揚げ", type: "text", text: "唐揚げ粉をまぶして2分揚げる。レモンを添える" },
            { name: "かわパリ", type: "text", text: "500Wで1分温め、片栗粉＋唐揚げ粉で2分揚げる。レモンを添える" },
            { name: "じゃこ天", type: "text", text: "両面を3分揚げる。天紙の上に6等分にして盛り、ネギ、しょうがを添える" },
            { name: "若鶏のからあげ", type: "text", text: "片栗粉をまぶして5分揚げる。サラダの上に盛り、レモン、マヨネーズを添える" },
            { name: "チキン南蛮", type: "steps", steps: ["500Wで1分温め、5分揚げる", "4等分に切ってサラダの上に盛る", "タルタルソース、南蛮酢、レモン、パセリをかける"] }
        ],
        "焼き場": [
            { name: "肉巻き（レタス / ヤンコン / アスパラ / エビ / モッツァレラ / オクラ）", type: "text", text: "味付け：塩コショウ" },
            { name: "肉巻き（うずら / なすチーズ / 白ネギ）", type: "text", text: "味付け：タレ" },
            { name: "えのき肉巻き", type: "text", text: "味付け：ポン酢" },
            { name: "大葉肉巻き", type: "text", text: "味付け：梅肉" },
            { name: "トマトチーズ肉巻き", type: "text", text: "味付け：バジル" },
            { name: "長芋明太マヨ肉巻き", type: "text", text: "味付け：明太マヨ" }
        ],
        "ポーション": [
            { name: "刺し場・野菜", type: "rows", rows: ["ピーマン：40g", "きゅうり：85-90g", "枝豆：100g", "えのぽん：60g", "蒸し鶏：50g"] },
            { name: "揚げ場・一品", type: "rows", rows: ["角煮：90g（3個）", "ポテトフライ：150g", "手羽先：3個", "とうもろこし：3個", "軟骨唐揚げ：100g", "かわぱり：100g", "里芋：8個", "ウインナー：6個"] },
            { name: "焼き場・肉", type: "rows", rows: ["エイヒレ：30g", "焼きおにぎり：160g", "サザエ：2個", "ホタテ：1個", "ホルモン：150g", "つくね：50g"] },
            { name: "釜飯・雑炊・調味料", type: "rows", rows: ["浸水米：200g", "雑炊・釜飯用 鶏肉：50g", "釜野菜(あげ・ゴボウ)：各10g", "雑炊エノキ：15g", "赤味噌：90g", "白味噌：90g（ニンニク5g、バター2個）", "凍結果実：40g"] }
        ]
    };

    function checkPassword() {
        const input = document.getElementById('password-input').value;
        if (input === CORRECT_PASSWORD) {
            document.getElementById('lock-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        } else {
            const error = document.getElementById('error-msg');
            error.classList.remove('hidden');
        }
    }

    function openCategory(catName) {
        document.getElementById('menu-categories').classList.add('hidden');
        document.getElementById('page-title').textContent = catName;
        document.getElementById('back-btn').classList.remove('hidden');

        if (catName === "シフト表") {
            document.getElementById('shift-view').classList.remove('hidden');
            return;
        }

        const container = document.getElementById('accordion-container');
        container.innerHTML = '';
        document.getElementById('list-view').classList.remove('hidden');

        data[catName].forEach(item => {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 transition-all';

            const btn = document.createElement('button');
            btn.className = 'w-full text-left p-4 font-bold text-gray-800 flex justify-between items-center active:bg-gray-50';
            btn.innerHTML = `<span>${item.name}</span><span class="text-xs text-gray-400 transition-transform duration-200 arrow">▼</span>`;

            const content = document.createElement('div');
            content.className = 'accordion-content px-4 text-sm text-gray-600 border-t border-gray-50';

            if (item.type === "text") {
                content.innerHTML = `<div class="py-2 leading-relaxed whitespace-pre-wrap">${item.text}</div>`;
            } else if (item.type === "steps") {
                let html = '<div class="py-2 space-y-2">';
                item.steps.forEach((step, i) => {
                    html += `<div class="flex"><span class="text-[#007AFF] font-bold mr-2">${i+1}.</span><span>${step}</span></div>`;
                });
                content.innerHTML = html + '</div>';
            } else if (item.type === "rows") {
                let html = '<div class="py-2 divide-y divide-gray-50">';
                item.rows.forEach(row => {
                    html += `<div class="py-2 flex justify-between"><span>${row.split('：')[0]}</span><span class="font-bold text-gray-800">${row.split('：')[1] || ''}</span></div>`;
                });
                content.innerHTML = html + '</div>';
            }

            btn.onclick = () => {
                const isOpen = content.classList.contains('open');
                
                // 他の開いているアコーディオンを全部閉じる
                document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('open'));
                document.querySelectorAll('.arrow').forEach(a => a.style.transform = 'rotate(0deg)');

                if (!isOpen) {
                    content.classList.add('open');
                    btn.querySelector('.arrow').style.transform = 'rotate(180deg)';
                }
            };

            card.appendChild(btn);
            card.appendChild(content);
            container.appendChild(card);
        });
    }

    function goBack() {
        document.getElementById('menu-categories').classList.remove('hidden');
        document.getElementById('list-view').classList.add('hidden');
        document.getElementById('shift-view').classList.add('hidden');
        document.getElementById('back-btn').classList.add('hidden');
        document.getElementById('page-title').textContent = "キッチンメモ";
    }
</script>
</body>
</html>
