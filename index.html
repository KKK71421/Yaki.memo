<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>キッチンメモ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #F2F2F7; /* iOS標準の薄いグレー */
            -webkit-tap-highlight-color: transparent;
        }
        /* スムーズな開閉アニメーション */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.2s;
            opacity: 0;
        }
        .accordion-content.open {
            max-height: 1200px; /* 写真が入っても収まるよう拡張 */
            opacity: 1;
            padding-top: 12px;
            padding-bottom: 12px;
        }
    </style>
</head>
<body class="p-4 pb-12 select-none">

<div id="app" class="max-w-md mx-auto">
    
    <div id="main-content">
        <header class="flex items-center justify-between mb-5 px-1">
            <button id="back-btn" onclick="goBack()" class="text-[#007AFF] font-bold text-md hidden flex items-center">
                ‹ 戻る
            </button>
            <h1 id="page-title" class="text-2xl font-bold text-gray-900 transition-all">キッチンメモ</h1>
            <div class="w-10"></div> 
        </header>

        <!-- 🗂️ カテゴリトップメニュー -->
        <div id="menu-categories" class="space-y-3">
            <button onclick="openCategory('刺し場')" class="w-full p-5 bg-white rounded-2xl text-left font-bold text-gray-800 shadow-sm flex justify-between items-center active:bg-gray-50">
                <span>刺し場</span><span class="text-gray-300">›</span>
            </button>
            <button onclick="openCategory('揚げ場')" class="w-full p-5 bg-white rounded-2xl text-left font-bold text-gray-800 shadow-sm flex justify-between items-center active:bg-gray-50">
                <span>揚げ場</span><span class="text-gray-300">›</span>
            </button>
            <button onclick="openCategory('焼き場')" class="w-full p-5 bg-white rounded-2xl text-left font-bold text-gray-800 shadow-sm flex justify-between items-center active:bg-gray-50">
                <span>焼き場</span><span class="text-gray-300">›</span>
            </button>
            <button onclick="openCategory('ポーション')" class="w-full p-5 bg-white rounded-2xl text-left font-bold text-gray-800 shadow-sm flex justify-between items-center active:bg-gray-50">
                <span>ポーション</span><span class="text-gray-300">›</span>
            </button>
        </div>

        <!-- 📜 リスト表示エリア（アコーディオン） -->
        <div id="list-view" class="hidden space-y-2">
            <div id="accordion-container" class="space-y-2"></div>
        </div>
    </div>
</div>

<script>
    // 業務データ
    // 💡 各メニューの末尾に img: "画像のURL" または "画像ファイル名.jpg" を追加できます。
    const data = {
        "刺し場": [
            { name: "枝豆", type: "text", text: "500W2分、塩", img: "枝豆.jpg" }, 
            { name: "えのきぽんず", type: "steps", steps: ["500W1分", "ネギ、大根 ポン酢"] },
            { name: "無限ピーマン", type: "text", text: "ごま油、塩、塩昆布、白ご目で和える" },
            { name: "漬物盛合せ", type: "text", text: "たくあん30g、かっぱ30g、しば漬け30g" },
            { name: "長芋わさび", type: "text", text: "80g、刻みのり" },
            { name: "たたききゅうり", type: "steps", steps: ["塩だれ、白ごま"] },
            { name: "たこわさ / 梅クラゲ", type: "text", text: "半大葉、各30g" },
            { name: "チャンジャ", type: "text", text: "半大葉、30g。ネギ" },
            { name: "とりかわぽんず", type: "steps", steps: ["大葉", "オニオンスライス", "とりかわ", "ネギ、大根おろし、ポン酢"] },
            { name: "蒸し鶏ぽんず", type: "steps", steps: ["大葉", "オニオンスライス", "蒸し鶏", "ネギ、大根おろし、ポン酢"] },
            { name: "とりのたたき", type: "steps", steps: ["オニスラ、大葉", "たたきを4枚", "ネギ、しょうが"] },
            { name: "鶏わさび和え / 梅肉和え", type: "steps", steps: ["大葉、オニスラ", "ユッケ60g わさび、醤油（または梅肉）を和える", "のり"] },
            { name: "鶏ユッケ / 鶏塩ユッケ", type: "steps", steps: ["大葉、オニスラ", "ユッケ60g", "ユッケタレ（または塩だれ）", "生うずら、ネギ、白ごま"] },
            { name: "出汁巻きたまご", type: "text", text: "600Wで4分温め、笹葉、おろし大根" },
            { name: "しめさば", type: "text", text: "水で解凍後、8等分にして炙る。オニスラ・大葉、わさび" },
            { name: "サラダ（蒸し鶏/豆腐塩昆布/温玉シーザー）", type: "text", text: "ベース：サラダ、オニスラ、ミニトマト2個2等分\n・蒸し鶏：ささみ1P＋胡麻ドレ+のり\n・豆腐：豆腐半丁4等分＋塩昆布＋和風ドレ＋かつお節\n・シーザー：温玉1個＋クルトン＋粉チーズ＋シーザードレ" }
        ],
        "揚げ場": [
            { name: "ポテトフライ 1P", type: "text", text: "2分30秒 天紙 塩 ケチャップ パセリ" },
            { name: "からあげ 片 4個", type: "text", text: "5分 サラダ、レモン、マヨネーズ" },
            { name: "チキン南蛮", type: "steps", steps: ["500Wで1分、5分予熱2分", "4等分に切ってサラダの上に盛る", "タルタルソース、南蛮酢、レモン、パセリ"], img: "チキン南蛮.jpg" },
            { name: "手羽先からあげ 片 1P(3個)", type: "steps", steps: ["500W1分", "6分", "キャベツ、手羽タレ、塩コショウ、白ごま"] },
            { name: "なんこつからあげ 唐", type: "text", text: "2分半 天紙 レモン" },
            { name: "里芋からあげ 片 (8個)", type: "text", text: "4分 天紙 塩" , img: "里芋からあげ.jpg" },
            { name: "かわパリ 片+唐 1P", type: "text", text: "500W1分、2分 天紙 レモン",img: "かわぱり.jpg" },
            { name: "さつまいもバター 6枚", type: "text", text: "3分 天紙 バター ハチミツ パセリ" },
            { name: "さつまいもバニラ 3枚", type: "text", text: "3分 天紙 バニラアイス ハチミツ " },
            { name: "あげたて厚揚げ 豆腐半丁2等分", type: "text", text: "4分 笹葉 もつだし しょうが ネギ カツオ", img: "厚揚げ.jpg" },
            { name: "えびせん 10枚", type: "text", text: "浮いてきて芯がなければOK!! 天紙" },
            { name: "もろこしからあげ 1P(3個)", type: "text", text: "2分半 鉄砲串 天紙 塩 パセリ", img: "もろこしからあげ.jpg" },
            { name: "ウィンナー 1P", type: "text", text: "2分 サラダ  ケチャップ " },
            { name: "じゃこ天", type: "text", text: "片面2分ずつ 天紙の上に6等分にして盛り、ネギ、しょうが" },
            { name: "ささみあげ（人数分）", type: "text", text: "4分予熱2分 サラダ 梅肉" }
        ],
        "焼き場": [
            { name: "レタス / ヤンコン / アスパラ / エビ / モッツァレラ / オクラ肉巻き", type: "text", text: "味付け：塩コショウ" },
            { name: "うずら / なすチーズ / 白ネギ肉巻き ", type: "text", text: "味付け：タレ" },
            { name: "えのき肉巻き", type: "text", text: "味付け：ポン酢" },
            { name: "大葉肉巻き", type: "text", text: "味付け：梅肉" },
            { name: "トマトチーズ肉巻き", type: "text", text: "味付け：バジル" },
            { name: "長芋明太マヨ肉巻き", type: "text", text: "味付け：明太マヨ" }
        ],
        "ポーション": [
            { name: "刺し場・野菜", type: "rows", rows: ["ピーマン：40g", "きゅうり：85-90g", "枝豆：100g", "えのぽん：60g", "蒸し鶏：50g"] },
            { name: "揚げ場・一品", type: "rows", rows: ["角煮：90g（3個）", "ポテトフライ：150g", "手羽先：3個", "とうもろこし：3個", "軟骨唐揚げ：100g", "かわぱり：100g", "里芋：8個", "ウインナー：6個"] },
            { name: "焼き場・肉", type: "rows", rows: ["エイヒレ：30g", "焼きおにぎり：160g", "サザエ：2個", "ホタテ：1個", "ホルモン：150g", "つくね：50g"] },
            { name: "釜飯・雑炊・調味料", type: "rows", rows: ["浸水米：200g", "雑炊・釜飯用 鶏肉：50g", "釜野菜(あげ・ゴボウ)：各10g", "雑炊エノキ：15g", "赤味噌：90g", "白味噌：90g（ニンニク5g、バター2個）", "凍結果実：40g"] }
        ]
    };

    function openCategory(catName) {
        document.getElementById('menu-categories').classList.add('hidden');
        document.getElementById('page-title').textContent = catName;
        document.getElementById('back-btn').classList.remove('hidden');

        const container = document.getElementById('accordion-container');
        container.innerHTML = '';
        document.getElementById('list-view').classList.remove('hidden');

        data[catName].forEach(item => {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 transition-all';

            const btn = document.createElement('button');
            btn.className = 'w-full text-left p-4 font-bold text-gray-800 flex justify-between items-center active:bg-gray-50';
            btn.innerHTML = `
                <span class="flex items-center gap-2">
                    ${item.name}
                    ${item.img ? '<span class="text-xs bg-blue-50 text-[#007AFF] px-1.5 py-0.5 rounded-full font-normal">盛り付け参考あり</span>' : ''}
                </span>
                <span class="text-xs text-gray-400 transition-transform duration-200 arrow">▼</span>
            `;

            const content = document.createElement('div');
            content.className = 'accordion-content px-4 text-sm text-gray-600 border-t border-gray-50';

            let bodyHtml = '';

            // 📷 写真が指定されている場合は表示
            if (item.img) {
                bodyHtml += `
                    <div class="mb-3 mt-1 overflow-hidden rounded-lg border border-gray-100">
                        <img src="${item.img}" alt="${item.name}" class="w-full h-48 object-cover loading="lazy"">
                    </div>
                `;
            }

            // 手順・テキストのレンダリング
            if (item.type === "text") {
                bodyHtml += `<div class="py-1 leading-relaxed whitespace-pre-wrap">${item.text}</div>`;
            } else if (item.type === "steps") {
                bodyHtml += '<div class="py-1 space-y-1.5">';
                item.steps.forEach((step, i) => {
                    bodyHtml += `<div class="flex"><span class="text-[#007AFF] font-bold mr-2">${i+1}.</span><span>${step}</span></div>`;
                });
                bodyHtml += '</div>';
            } else if (item.type === "rows") {
                bodyHtml += '<div class="py-1 divide-y divide-gray-50">';
                item.rows.forEach(row => {
                    bodyHtml += `<div class="py-1.5 flex justify-between"><span>${row.split('：')[0]}</span><span class="font-bold text-gray-800">${row.split('：')[1] || ''}</span></div>`;
                });
                bodyHtml += '</div>';
            }

            content.innerHTML = bodyHtml;

            btn.onclick = () => {
                const isOpen = content.classList.contains('open');
                
                document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('open'));
                document.querySelectorAll('.arrow').forEach(a => a.style.transform = 'rotate(0deg)');

                if (!isOpen) {
                    content.classList.add('open');
                    btn.querySelector('.arrow').style.transform = 'rotate(180deg)';
                }
            };

            card.appendChild(btn);
            card.appendChild(content);
            container.appendChild(card);
        });
    }

    function goBack() {
        document.getElementById('menu-categories').classList.remove('hidden');
        document.getElementById('list-view').classList.add('hidden');
        document.getElementById('back-btn').classList.add('hidden');
        document.getElementById('page-title').textContent = "キッチンメモ";
    }
</script>
</body>
</html>
