<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キッチン手順 確認アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f0f2f5; color: #1f2937; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        /* アコーディオン展開用のアニメーション */
        .accordion-content { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.3s ease-out, opacity 0.2s; 
            opacity: 0; 
        }
        .accordion-content.open { 
            max-height: 1000px; 
            opacity: 1; 
            padding-bottom: 16px;
        }
        .menu-item.active { background-color: #f8fafc; }
        .step-bubble { background: #f8fafc; border-left: 6px solid #3b82f6; }
        .portion-row { border-bottom: 1px inset #f1f5f9; padding: 8px 0; }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body class="p-4 pb-12">

<div id="app" class="max-w-md mx-auto">
    
    <div id="lock-screen" class="flex flex-col items-center justify-center min-h-[80vh]">
        <div class="card p-8 w-full text-center">
            <div class="mb-6 text-5xl text-blue-500">🔒</div>
            <h2 class="text-xl font-bold mb-4">合言葉を入力してください</h2>
            <input type="password" id="password-input" class="w-full p-4 border-2 border-gray-200 rounded-xl mb-4 text-center text-2xl" placeholder="****">
            <button onclick="checkPassword()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-lg active:bg-blue-700">認証する</button>
            <p id="error-msg" class="mt-4 text-red-500 font-bold hidden">合言葉が違います</p>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header class="flex flex-col items-center mb-6">
            <div class="flex items-center w-full relative">
                <button id="global-back-btn" class="hidden absolute left-0 p-2 bg-white rounded-full shadow text-gray-600 active:bg-gray-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <h1 class="text-2xl font-black text-gray-800 mx-auto">キッチンメモ</h1>
            </div>
            <div id="top-update-banner" class="mt-2 px-4 py-1 bg-white rounded-full shadow-sm border border-gray-200">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Latest Update:</span>
                <span id="update-time-display" class="text-xs font-black text-blue-600 ml-1">---</span>
            </div>
        </header>

        <div id="difficulty-select" class="grid gap-3">
            <button onclick="selectCategory('single_star')" class="p-5 card border-b-4 border-blue-500 text-xl font-bold text-blue-700 flex justify-between items-center">🐟 刺し場</button>
            <button onclick="selectCategory('double_star')" class="p-5 card border-b-4 border-orange-500 text-xl font-bold text-orange-700 flex justify-between items-center">🍟 揚げ場</button>
            <button onclick="selectCategory('triple_star')" class="p-5 card border-b-4 border-red-500 text-xl font-bold text-red-700 flex justify-between items-center">🔥 焼き場</button>
            <button onclick="selectCategory('portion')" class="p-5 card border-b-4 border-green-500 text-xl font-bold text-green-700 flex justify-between items-center">⚖️ ポーション</button>
            <button onclick="showShiftScreen()" class="p-5 card border-b-4 border-purple-500 text-xl font-bold text-purple-700 flex justify-between items-center">📅 シフト表</button>
        </div>

        <div id="menu-list-screen" class="hidden">
            <h2 id="menu-list-heading" class="text-xl font-bold mb-4 px-2 text-gray-700"></h2>
            <div id="accordion-area" class="grid gap-2"></div>
            <button onclick="handleBack()" class="mt-8 w-full py-4 bg-gray-800 text-white rounded-xl font-bold">戻る</button>
        </div>

        <div id="shift-screen" class="hidden">
            <div class="card p-5 border-t-8 border-purple-500 text-center">
                <h3 class="text-2xl font-black text-purple-700">📅 シフト表</h3>
                <div class="mb-4 inline-block px-3 py-1 bg-purple-50 rounded-full border border-purple-100">
                    <span id="shift-update-time-display" class="text-[10px] font-bold text-purple-600">---</span>
                </div>
                
                <div class="space-y-4 text-left">
                    <div>
                        <span class="text-xs font-bold text-purple-500 ml-1">▼ 1日 〜 15日</span>
                        <div class="mt-1 bg-gray-100 rounded-lg min-h-[200px] flex items-center justify-center overflow-hidden border-2 border-purple-200">
                            <img id="shift-display-img-1" src="" class="w-full h-auto" alt="読み込み中..." onclick="window.open(this.src, '_blank')">
                        </div>
                    </div>
                    <div>
                        <span class="text-xs font-bold text-purple-500 ml-1">▼ 16日 〜 末日</span>
                        <div class="mt-1 bg-gray-100 rounded-lg min-h-[200px] flex items-center justify-center overflow-hidden border-2 border-purple-200">
                            <img id="shift-display-img-2" src="" class="w-full h-auto" alt="読み込み中..." onclick="window.open(this.src, '_blank')">
                        </div>
                    </div>
                </div>
                <button onclick="handleBack()" class="mt-8 w-full py-4 bg-gray-800 text-white rounded-xl font-bold">メニューに戻る</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 管理者設定エリア（ここを自由に書き換えてください）
    // ==========================================
    const CORRECT_PASSWORD = '1405'; 
    const SHIFT_IMAGE_URL_1 = 'https://drive.google.com/file/d/1zHH3IqT30XMp83ft2s6X7oAM-8ySHNNP/view?usp=drive_link'; 
    const SHIFT_IMAGE_URL_2 = 'https://drive.google.com/file/d/1J-N8B4IvyShS9qhQTNpTsvL67wxqFihk/view?usp=drive_link'; 
    const SHIFT_UPDATE_TIME = '2024/03/12 18:00 更新'; 

    function checkPassword() {
        const input = document.getElementById('password-input').value;
        if (input === CORRECT_PASSWORD) {
            document.getElementById('lock-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            // 両方の表示箇所に時間をセット
            document.getElementById('update-time-display').textContent = SHIFT_UPDATE_TIME;
            document.getElementById('shift-update-time-display').textContent = SHIFT_UPDATE_TIME;
        } else {
            document.getElementById('error-msg').classList.remove('hidden');
            document.getElementById('lock-screen').classList.add('shake');
            setTimeout(() => document.getElementById('lock-screen').classList.remove('shake'), 500);
        }
    }

    function selectCategory(diff) {
        currentDifficulty = diff;
        renderAccordionList();
    }

    function renderAccordionList() {
        const area = document.getElementById('accordion-area');
        area.innerHTML = '';
        const filtered = quizzes.filter(q => q.difficulty === currentDifficulty);
        const names = { 'single_star': '刺し場', 'double_star': '揚げ場', 'triple_star': '焼き場', 'portion': 'ポーション' };
        document.getElementById('menu-list-heading').textContent = `【${names[currentDifficulty]}】`;

        filtered.forEach((quiz, index) => {
            const container = document.createElement('div');
            container.className = 'card menu-item overflow-hidden border-l-4 border-transparent transition-all';
            const accentColors = { 'single_star': 'border-blue-500', 'double_star': 'border-orange-500', 'triple_star': 'border-red-500', 'portion': 'border-green-500' };

            const btn = document.createElement('button');
            btn.className = 'w-full text-left p-4 flex justify-between items-center font-bold text-gray-700 active:bg-gray-50';
            btn.innerHTML = `<span>${quiz.name}</span><span class="text-xs transition-transform arrow">▼</span>`;
            
            const content = document.createElement('div');
            content.className = 'accordion-content px-4';
            
            if (currentDifficulty === 'portion') {
                let html = '<div class="space-y-1">';
                quiz.data.forEach(d => {
                    html += `<div class="portion-row flex justify-between"><span>${d.item}</span><span class="font-bold text-green-600">${d.amount}${d.unit}</span></div>`;
                });
                content.innerHTML = html + '</div>';
            } else if (currentDifficulty === 'triple_star') {
                content.innerHTML = `<div class="p-4 bg-red-50 text-red-700 rounded-xl text-center font-bold">味付け：${quiz.answer}</div>`;
            } else if (quiz.type === 'multiple_choice') {
                content.innerHTML = `<div class="p-4 bg-blue-50 text-blue-800 rounded-xl text-center font-bold">${quiz.answer}</div>`;
            } else {
                let html = '<div class="space-y-2">';
                quiz.steps.forEach((s, i) => {
                    html += `<div class="step-bubble p-3 rounded-lg text-sm"><span class="font-bold text-blue-500 mr-2">${i+1}.</span>${s}</div>`;
                });
                content.innerHTML = html + '</div>';
            }

            btn.onclick = () => {
                const isOpen = content.classList.contains('open');
                document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('open'));
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active', accentColors[currentDifficulty]));
                document.querySelectorAll('.arrow').forEach(a => a.style.transform = 'rotate(0deg)');

                if (!isOpen) {
                    content.classList.add('open');
                    container.classList.add('active', accentColors[currentDifficulty]);
                    btn.querySelector('.arrow').style.transform = 'rotate(180deg)';
                    setTimeout(() => container.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
                }
            };

            container.appendChild(btn);
            container.appendChild(content);
            area.appendChild(container);
        });
        showScreen('menu-list-screen');
    }

    function showShiftScreen() {
        renderShiftImage('shift-display-img-1', SHIFT_IMAGE_URL_1);
        renderShiftImage('shift-display-img-2', SHIFT_IMAGE_URL_2);
        showScreen('shift-screen');
    }

    function renderShiftImage(elementId, rawUrl) {
        const img = document.getElementById(elementId);
        let fileId = "";
        if (rawUrl.includes('/d/')) fileId = rawUrl.split('/d/')[1].split('/')[0];
        else if (rawUrl.includes('id=')) fileId = rawUrl.split('id=')[1].split('&')[0];
        img.src = fileId ? `https://drive.google.com/thumbnail?authuser=0&sz=w1000&id=${fileId}` : rawUrl;
    }

    function showScreen(id) {
        ['difficulty-select', 'menu-list-screen', 'shift-screen'].forEach(s => {
            const el = document.getElementById(s);
            if(el) el.classList.toggle('hidden', s !== id);
        });
        document.getElementById('global-back-btn').classList.toggle('hidden', id === 'difficulty-select');
        document.getElementById('top-update-banner').classList.toggle('hidden', id !== 'difficulty-select');
    }

</script>
